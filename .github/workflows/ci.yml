name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Lint & validar currículo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Checar sintaxe JS
        run: npm run check
      - name: Validar currículo
        run: npm run validate
